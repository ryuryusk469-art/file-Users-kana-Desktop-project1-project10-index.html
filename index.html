<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カタカナ五十音表（単語音声付）</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
        body { font-family: 'DM Sans', sans-serif; }
        .kana-btn { 
          transition: all 0.15s ease; 
          background: linear-gradient(135deg, rgba(255,200,221,0.9), rgba(255,182,193,0.8)) !important;
          color: #ff89b4;
          box-shadow: 0 4px 12px rgba(255, 137, 180, 0.2);
          border: 2px solid rgba(255,255,255,0.4) !important;
        }
        .kana-btn:hover { 
          transform: scale(1.12); 
          box-shadow: 0 6px 18px rgba(255, 137, 180, 0.4);
        }
        .kana-btn:active { transform: scale(0.95); }
        .modal-overlay { transition: opacity 0.2s ease; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body class="min-h-screen w-full" style="background: linear-gradient(135deg, rgba(255, 182, 193, 0.3), rgba(255, 192, 203, 0.2), rgba(255, 228, 225, 0.3));">

  <header class="pt-8 pb-4 text-center">
   <h1 class="text-3xl font-bold" style="color: rgb(255, 255, 255); font-size: 32px;">カタカナ五十音表</h1>
   <p class="mt-2 opacity-80" style="color: rgb(255, 255, 255); font-size: 15px;">文字をタップして発音と単語を聞こう！</p>
  </header>

  <main class="max-w-3xl mx-auto px-4 pb-12">
   <div id="kana-grid" class="grid gap-2" style="grid-template-columns: repeat(5, 1fr);"></div>
  </main>

  <div id="modal" class="modal-overlay hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40" role="dialog" aria-modal="true">
   <div class="rounded-2xl p-8 text-center shadow-2xl max-w-xs w-full mx-4" style="background: rgb(255, 245, 248); color: rgb(90, 90, 126);">
    
    <div class="flex items-center justify-center gap-3 mb-2 cursor-pointer group" onclick="playCurrentContent()">
        <p id="modal-kana" class="text-6xl font-bold text-[#ff89b4] group-hover:scale-105 transition-transform"></p>
        <span class="text-2xl text-[#ff89b4] opacity-70 group-hover:opacity-100">🔊</span>
    </div>

    <div class="cursor-pointer hover:opacity-80 py-1" onclick="playCurrentContent()">
        <p id="modal-word" class="text-2xl font-bold text-slate-700"></p>
    </div>
    
    <p id="modal-meaning" class="text-base opacity-70 border-t border-pink-200 pt-2 mt-2"></p>
    
    <button class="mt-6 px-6 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-90" onclick="closeModal()" style="background: rgb(255, 137, 180); color: rgb(255, 255, 255); font-size: 16px;">とじる</button>
   </div>
  </div>

  <script>
        const kanaData = [
            ["ア","アイス","ice cream"],["イ","インク","ink"],["ウ","ウサギ","rabbit"],["エ","エビ","shrimp"],["オ","オレンジ","orange"],
            ["カ","カメラ","camera"],["キ","キリン","giraffe"],["ク","クマ","bear"],["ケ","ケーキ","cake"],["コ","コーヒー","coffee"],
            ["サ","サッカー","soccer"],["シ","シマウマ","zebra"],["ス","スイカ","watermelon"],["セ","セミ","cicada"],["ソ","ソファ","sofa"],
            ["タ","タマゴ","egg"],["チ","チーズ","cheese"],["ツ","ツキ","moon"],["テ","テレビ","TV"],["ト","トマト","tomato"],
            ["ナ","ナス","eggplant"],["ニ","ニワトリ","chicken"],["ヌ","ヌイグルミ","stuffed toy"],["ネ","ネコ","cat"],["ノ","ノート","notebook"],
            ["ハ","ハチ","bee"],["ヒ","ヒマワリ","sunflower"],["フ","フクロウ","owl"],["ヘ","ヘビ","snake"],["ホ","ホシ","star"],
            ["マ","マド","window"],["ミ","ミカン","mandarin"],["ム","ムシ","insect"],["メ","メガネ","glasses"],["モ","モモ","peach"],
            ["ヤ","ヤマ","mountain"],["","",""],["ユ","ユキ","snow"],["","",""],["ヨ","ヨル","night"],
            ["ラ","ライオン","lion"],["リ","リンゴ","apple"],["ル","ルビー","ruby"],["レ","レモン","lemon"],["ロ","ロボット","robot"],
            ["ワ","ワニ","crocodile"],["","",""],["","",""],["","",""],["ヲ","ヲ","(particle)"],
            ["ン","ンジャメナ","N'Djamena"],["","",""],["","",""],["","",""],["","",""]
        ];

        const grid = document.getElementById('kana-grid');
        const modal = document.getElementById('modal');
        
        let currentKana = "";
        let currentWord = "";

        // グリッドの生成
        kanaData.forEach(([kana, word, meaning]) => {
            if (!kana) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
                return;
            }
            const btn = document.createElement('button');
            btn.className = 'kana-btn rounded-xl aspect-square flex items-center justify-center text-2xl font-bold cursor-pointer border-2';
            btn.textContent = kana;
            btn.setAttribute('aria-label', kana + ' - ' + word);
            btn.addEventListener('click', () => openModal(kana, word, meaning));
            grid.appendChild(btn);
        });

        // 文字と単語を連続してきれいに発音する機能
        function playVocabularySound(kana, word) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 再生中の音声を一度クリア
                
                // 1. 文字（ア）の発音設定
                const utterKana = new SpeechSynthesisUtterance(kana);
                utterKana.lang = 'ja-JP';
                utterKana.rate = 0.85; // 聞き取りやすいように少しゆっくり
                
                // 2. 単語（アイス）の発音設定
                const utterWord = new SpeechSynthesisUtterance(word);
                utterWord.lang = 'ja-JP';
                utterWord.rate = 0.9;
                
                // 文字の後に少し間（ポーズ）を空けてから単語を喋らせるための細工
                // 英語表記の「ヲ」などの特殊対応
                if(kana === "ヲ") utterWord.text = "を";
                if(kana === "ン") utterWord.text = "んじゃめな";

                // キュー（順番）に投入
                window.speechSynthesis.speak(utterKana);
                window.speechSynthesis.speak(utterWord);
            }
        }

        function openModal(kana, word, meaning) {
            currentKana = kana;
            currentWord = word;
            
            document.getElementById('modal-kana').textContent = kana;
            document.getElementById('modal-word').textContent = word;
            document.getElementById('modal-meaning').textContent = meaning;
            modal.classList.remove('hidden');
            
            // モーダル表示時に「文字」→「単語」の順で発音
            playVocabularySound(kana, word);
        }

        // モーダル内のスピーカーや単語をタップしたときの再再生
        function playCurrentContent() {
            if (currentKana && currentWord) {
                playVocabularySound(currentKana, currentWord);
            }
        }

        function closeModal() {
            modal.classList.add('hidden');
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 閉じたら音声をストップ
            }
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
  </script>
</body>
</html>
